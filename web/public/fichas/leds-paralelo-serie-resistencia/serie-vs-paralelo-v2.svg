<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Comparación de tres LED en serie y en paralelo</title>
  <desc id="desc">Infografía esquemática que compara tres LED en serie y tres LED en paralelo conectados a 5V con una sola resistencia.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f4f1eb; }
      .card { fill: #fffdfa; stroke: #ded8ce; stroke-width: 2; filter: url(#shadow); }
      .title { font: 800 44px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 700 22px Arial, Helvetica, sans-serif; fill: #475569; }
      .body { font: 700 20px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 700 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 800 18px Arial, Helvetica, sans-serif; fill: #fffdfa; }
      .line { fill: none; stroke: #263238; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .redline { fill: none; stroke: #e85d50; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .turqline { fill: none; stroke: #10aeb4; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #263238; stroke: #fffdfa; stroke-width: 4; }
      .bus5 { fill: #e85d50; }
      .busg { fill: #263238; }
      .resistor { fill: #e3c99b; stroke: #8b5e34; stroke-width: 3; }
      .res-band-a { stroke: #8b2f23; stroke-width: 5; }
      .res-band-b { stroke: #111827; stroke-width: 5; }
      .res-band-c { stroke: #c89b28; stroke-width: 5; }
      .led-off { fill: #a7f3f0; stroke: #0f9da3; stroke-width: 4; opacity: 0.45; }
      .led-on { fill: #2dd4d0; stroke: #0f9da3; stroke-width: 4; }
      .glow { fill: #5eead4; opacity: 0.22; }
      .warning { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .ok { fill: #ecfeff; stroke: #10aeb4; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="800" class="bg"/>
  <circle cx="600" cy="392" r="335" fill="#33c7c9" opacity="0.08"/>

  <text x="80" y="66" class="title">Serie y paralelo con tres LED</text>
  <text x="80" y="102" class="subtitle">Misma alimentación de Arduino: 5V y GND. Cambia el recorrido de la corriente.</text>

  <rect x="70" y="140" width="500" height="570" rx="22" class="card"/>
  <rect x="630" y="140" width="500" height="570" rx="22" class="card"/>

  <!-- Shared visual pin legend -->
  <g transform="translate(926 60)">
    <rect x="0" y="0" width="56" height="32" rx="9" class="bus5"/>
    <text x="14" y="22" class="label">5V</text>
    <rect x="72" y="0" width="70" height="32" rx="9" class="busg"/>
    <text x="82" y="22" class="label">GND</text>
  </g>

  <!-- Left: series -->
  <text x="110" y="204" class="title">SERIE</text>
  <text x="110" y="238" class="subtitle">Un único camino</text>

  <g transform="translate(110 288)">
    <rect x="0" y="0" width="74" height="36" rx="9" class="bus5"/>
    <text x="23" y="24" class="label">5V</text>
    <rect x="330" y="296" width="92" height="36" rx="9" class="busg"/>
    <text x="346" y="320" class="label">GND</text>

    <path d="M74 18 H126" class="redline"/>
    <g transform="translate(126 0)">
      <rect x="0" y="0" width="92" height="36" rx="18" class="resistor"/>
      <line x1="20" y1="2" x2="20" y2="34" class="res-band-a"/>
      <line x1="44" y1="2" x2="44" y2="34" class="res-band-b"/>
      <line x1="68" y1="2" x2="68" y2="34" class="res-band-c"/>
      <text x="13" y="64" class="small">220 ohm</text>
    </g>

    <path d="M218 18 H280 V80" class="redline"/>

    <g transform="translate(280 104)">
      <path d="M0 -24 V-2" class="line"/>
      <path d="M0 72 V104" class="line"/>
      <circle cx="0" cy="35" r="38" class="led-off"/>
      <path d="M-18 20 L18 35 L-18 50 Z" fill="#0f9da3" opacity="0.45"/>
      <line x1="20" y1="18" x2="20" y2="52" stroke="#0f9da3" stroke-width="5" opacity="0.45"/>
      <text x="-34" y="126" class="small">LED 1</text>
    </g>

    <path d="M280 208 V248" class="line"/>

    <g transform="translate(280 284)">
      <path d="M0 -36 V-2" class="line"/>
      <path d="M0 72 V104" class="line"/>
      <circle cx="0" cy="35" r="38" class="led-off"/>
      <path d="M-18 20 L18 35 L-18 50 Z" fill="#0f9da3" opacity="0.38"/>
      <line x1="20" y1="18" x2="20" y2="52" stroke="#0f9da3" stroke-width="5" opacity="0.38"/>
      <text x="-34" y="126" class="small">LED 2</text>
    </g>

    <path d="M280 388 V432" class="line"/>

    <g transform="translate(280 468)">
      <path d="M0 -36 V-2" class="line"/>
      <circle cx="0" cy="35" r="38" class="led-off"/>
      <path d="M-18 20 L18 35 L-18 50 Z" fill="#0f9da3" opacity="0.32"/>
      <line x1="20" y1="18" x2="20" y2="52" stroke="#0f9da3" stroke-width="5" opacity="0.32"/>
      <text x="-34" y="126" class="small">LED 3</text>
    </g>

    <path d="M280 540 H376 V332" class="line"/>
    <circle cx="280" cy="80" r="8" class="node"/>
    <circle cx="280" cy="208" r="8" class="node"/>
    <circle cx="280" cy="388" r="8" class="node"/>

    <rect x="0" y="408" width="205" height="84" rx="16" class="warning"/>
    <text x="20" y="440" class="body">5V no alcanza</text>
    <text x="20" y="470" class="small">Las caídas de tensión</text>
    <text x="20" y="494" class="small">se suman.</text>
  </g>

  <!-- Right: parallel -->
  <text x="670" y="204" class="title">PARALELO</text>
  <text x="670" y="238" class="subtitle">Tres caminos separados</text>

  <g transform="translate(670 290)">
    <rect x="0" y="0" width="74" height="36" rx="9" class="bus5"/>
    <text x="23" y="24" class="label">5V</text>
    <rect x="0" y="414" width="92" height="36" rx="9" class="busg"/>
    <text x="16" y="438" class="label">GND</text>

    <path d="M74 18 H126" class="redline"/>
    <g transform="translate(126 0)">
      <rect x="0" y="0" width="92" height="36" rx="18" class="resistor"/>
      <line x1="20" y1="2" x2="20" y2="34" class="res-band-a"/>
      <line x1="44" y1="2" x2="44" y2="34" class="res-band-b"/>
      <line x1="68" y1="2" x2="68" y2="34" class="res-band-c"/>
      <text x="4" y="64" class="small">resistencia</text>
      <text x="20" y="88" class="small">compartida</text>
    </g>

    <path d="M218 18 H270 V116" class="redline"/>
    <path d="M270 116 H164" class="redline"/>
    <path d="M270 116 H376" class="redline"/>
    <path d="M270 116 V250" class="redline"/>

    <path d="M120 362 H420" class="line"/>
    <path d="M120 362 H46 V414" class="line"/>

    <g transform="translate(164 190)">
      <path d="M0 -74 V-38" class="redline"/>
      <ellipse cx="0" cy="0" rx="48" ry="48" class="glow"/>
      <circle cx="0" cy="0" r="38" class="led-on"/>
      <path d="M-18 -15 L18 0 L-18 15 Z" fill="#e8fffd"/>
      <line x1="20" y1="-17" x2="20" y2="17" stroke="#e8fffd" stroke-width="5"/>
      <path d="M0 38 V172" class="line"/>
      <text x="-34" y="204" class="small">LED 1</text>
    </g>

    <g transform="translate(270 250)">
      <path d="M0 -134 V-38" class="redline"/>
      <ellipse cx="0" cy="0" rx="48" ry="48" class="glow"/>
      <circle cx="0" cy="0" r="38" class="led-on"/>
      <path d="M-18 -15 L18 0 L-18 15 Z" fill="#e8fffd"/>
      <line x1="20" y1="-17" x2="20" y2="17" stroke="#e8fffd" stroke-width="5"/>
      <path d="M0 38 V112" class="line"/>
      <text x="-34" y="144" class="small">LED 2</text>
    </g>

    <g transform="translate(376 190)">
      <path d="M0 -74 V-38" class="redline"/>
      <ellipse cx="0" cy="0" rx="48" ry="48" class="glow"/>
      <circle cx="0" cy="0" r="38" class="led-on"/>
      <path d="M-18 -15 L18 0 L-18 15 Z" fill="#e8fffd"/>
      <line x1="20" y1="-17" x2="20" y2="17" stroke="#e8fffd" stroke-width="5"/>
      <path d="M0 38 V172" class="line"/>
      <text x="-34" y="204" class="small">LED 3</text>
    </g>

    <circle cx="270" cy="116" r="8" class="node"/>
    <circle cx="164" cy="116" r="8" class="node"/>
    <circle cx="376" cy="116" r="8" class="node"/>
    <circle cx="164" cy="362" r="8" class="node"/>
    <circle cx="270" cy="362" r="8" class="node"/>
    <circle cx="376" cy="362" r="8" class="node"/>

    <rect x="206" y="428" width="244" height="84" rx="16" class="ok"/>
    <text x="226" y="460" class="body">Todos reciben 5V</text>
    <text x="226" y="490" class="small">La corriente se reparte</text>
    <text x="226" y="514" class="small">entre las ramas.</text>
  </g>

  <text x="80" y="760" class="small">Nota: esta comparación usa una sola resistencia para estudiar serie y paralelo. El montaje recomendado es una resistencia por LED.</text>
</svg>
