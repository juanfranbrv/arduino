<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Comparación entre tres LED en serie y tres LED en paralelo</title>
  <desc id="desc">Infografía didáctica para Arduino que compara tres LED conectados en serie y en paralelo desde 5V, usando una resistencia compartida.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="arduino-board" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#13a8ad"/>
      <stop offset="1" stop-color="#087c83"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#36d1cf" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#36d1cf" stop-opacity="0"/>
    </radialGradient>
    <style>
      .bg { fill: #f4f1eb; }
      .panel { fill: #fffdfa; stroke: #e6e0d6; stroke-width: 2; }
      .breadboard { fill: #fbfaf6; stroke: #ded8ce; stroke-width: 2; filter: url(#shadow); }
      .slot { fill: #d8d2c8; opacity: 0.62; }
      .wire { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 9; }
      .wire-thin { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 5; }
      .turq { stroke: #0bb4b8; }
      .black { stroke: #23272b; }
      .red { stroke: #e45d4f; }
      .amber { stroke: #e6a23c; }
      .node { fill: #23272b; stroke: #fffdfa; stroke-width: 3; }
      .title { font: 800 42px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 700 22px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0; }
      .small { font: 700 18px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 0; }
      .pin-label { font: 800 18px Arial, Helvetica, sans-serif; fill: #fffdfa; letter-spacing: 0; }
      .note { font: 700 20px Arial, Helvetica, sans-serif; fill: #164e63; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="800"/>
  <ellipse cx="600" cy="390" rx="510" ry="300" fill="url(#halo)"/>

  <rect x="56" y="72" width="512" height="648" rx="28" class="panel"/>
  <rect x="632" y="72" width="512" height="648" rx="28" class="panel"/>

  <text x="98" y="132" class="title">SERIE</text>
  <text x="674" y="132" class="title">PARALELO</text>
  <text x="98" y="166" class="subtitle">La tensión se reparte</text>
  <text x="674" y="166" class="subtitle">La corriente se divide</text>

  <!-- Arduino source card -->
  <g transform="translate(470 315)" filter="url(#soft-shadow)">
    <rect x="-56" y="-84" width="220" height="168" rx="18" fill="url(#arduino-board)"/>
    <rect x="-34" y="-62" width="74" height="42" rx="7" fill="#d6d3ca"/>
    <rect x="62" y="-58" width="72" height="18" rx="4" fill="#111827"/>
    <rect x="62" y="-28" width="72" height="18" rx="4" fill="#111827"/>
    <circle cx="4" cy="36" r="14" fill="#111827" opacity="0.88"/>
    <circle cx="45" cy="36" r="10" fill="#d6d3ca"/>
    <circle cx="76" cy="36" r="10" fill="#d6d3ca"/>
    <text x="7" y="7" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#fffdfa">UNO</text>
    <rect x="132" y="-76" width="48" height="28" rx="8" fill="#ef4444"/>
    <rect x="132" y="48" width="48" height="28" rx="8" fill="#111827"/>
    <text x="142" y="-55" class="pin-label">5V</text>
    <text x="137" y="68" class="pin-label">GND</text>
  </g>

  <!-- Left breadboard: series -->
  <g transform="translate(98 244)">
    <rect x="0" y="0" width="390" height="330" rx="22" class="breadboard"/>
    <rect x="182" y="34" width="22" height="262" rx="10" fill="#eee9df"/>
    <line x1="28" y1="292" x2="154" y2="292" class="wire-thin red"/>
    <line x1="235" y1="292" x2="362" y2="292" class="wire-thin turq"/>
    <text x="36" y="318" class="small" fill="#e45d4f">+</text>
    <text x="344" y="318" class="small" fill="#0f9da3">-</text>

    <!-- Breadboard holes -->
    <g opacity="0.92">
      <circle class="slot" cx="44" cy="56" r="5"/><circle class="slot" cx="74" cy="56" r="5"/><circle class="slot" cx="104" cy="56" r="5"/><circle class="slot" cx="134" cy="56" r="5"/><circle class="slot" cx="164" cy="56" r="5"/>
      <circle class="slot" cx="226" cy="56" r="5"/><circle class="slot" cx="256" cy="56" r="5"/><circle class="slot" cx="286" cy="56" r="5"/><circle class="slot" cx="316" cy="56" r="5"/><circle class="slot" cx="346" cy="56" r="5"/>
      <circle class="slot" cx="44" cy="96" r="5"/><circle class="slot" cx="74" cy="96" r="5"/><circle class="slot" cx="104" cy="96" r="5"/><circle class="slot" cx="134" cy="96" r="5"/><circle class="slot" cx="164" cy="96" r="5"/>
      <circle class="slot" cx="226" cy="96" r="5"/><circle class="slot" cx="256" cy="96" r="5"/><circle class="slot" cx="286" cy="96" r="5"/><circle class="slot" cx="316" cy="96" r="5"/><circle class="slot" cx="346" cy="96" r="5"/>
      <circle class="slot" cx="44" cy="136" r="5"/><circle class="slot" cx="74" cy="136" r="5"/><circle class="slot" cx="104" cy="136" r="5"/><circle class="slot" cx="134" cy="136" r="5"/><circle class="slot" cx="164" cy="136" r="5"/>
      <circle class="slot" cx="226" cy="136" r="5"/><circle class="slot" cx="256" cy="136" r="5"/><circle class="slot" cx="286" cy="136" r="5"/><circle class="slot" cx="316" cy="136" r="5"/><circle class="slot" cx="346" cy="136" r="5"/>
      <circle class="slot" cx="44" cy="176" r="5"/><circle class="slot" cx="74" cy="176" r="5"/><circle class="slot" cx="104" cy="176" r="5"/><circle class="slot" cx="134" cy="176" r="5"/><circle class="slot" cx="164" cy="176" r="5"/>
      <circle class="slot" cx="226" cy="176" r="5"/><circle class="slot" cx="256" cy="176" r="5"/><circle class="slot" cx="286" cy="176" r="5"/><circle class="slot" cx="316" cy="176" r="5"/><circle class="slot" cx="346" cy="176" r="5"/>
      <circle class="slot" cx="44" cy="216" r="5"/><circle class="slot" cx="74" cy="216" r="5"/><circle class="slot" cx="104" cy="216" r="5"/><circle class="slot" cx="134" cy="216" r="5"/><circle class="slot" cx="164" cy="216" r="5"/>
      <circle class="slot" cx="226" cy="216" r="5"/><circle class="slot" cx="256" cy="216" r="5"/><circle class="slot" cx="286" cy="216" r="5"/><circle class="slot" cx="316" cy="216" r="5"/><circle class="slot" cx="346" cy="216" r="5"/>
    </g>

    <!-- Series path -->
    <path d="M-10 92 H54" class="wire red"/>
    <rect x="54" y="73" width="78" height="38" rx="18" fill="#ddc7a0" stroke="#8b5e34" stroke-width="3"/>
    <line x1="70" y1="74" x2="70" y2="110" stroke="#8b2f23" stroke-width="5"/>
    <line x1="91" y1="74" x2="91" y2="110" stroke="#202020" stroke-width="5"/>
    <line x1="112" y1="74" x2="112" y2="110" stroke="#c2932d" stroke-width="5"/>
    <path d="M132 92 H162 V142 H206" class="wire red"/>
    <g transform="translate(226 142)">
      <path d="M-22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M-30 -16 C-30 -56 30 -56 30 -16 C30 8 12 20 0 20 C-12 20 -30 8 -30 -16Z" fill="#75e4e2" stroke="#0f9da3" stroke-width="4" opacity="0.55"/>
    </g>
    <path d="M248 174 H292 V142" class="wire red"/>
    <g transform="translate(314 142)">
      <path d="M-22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M-30 -16 C-30 -56 30 -56 30 -16 C30 8 12 20 0 20 C-12 20 -30 8 -30 -16Z" fill="#75e4e2" stroke="#0f9da3" stroke-width="4" opacity="0.45"/>
    </g>
    <path d="M336 174 H336 V222 H292" class="wire red"/>
    <g transform="translate(270 222)">
      <path d="M-22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M-30 -16 C-30 -56 30 -56 30 -16 C30 8 12 20 0 20 C-12 20 -30 8 -30 -16Z" fill="#75e4e2" stroke="#0f9da3" stroke-width="4" opacity="0.35"/>
    </g>
    <path d="M248 254 H388" class="wire black"/>
    <circle class="node" cx="54" cy="92" r="8"/>
    <circle class="node" cx="388" cy="254" r="8"/>
  </g>

  <text x="118" y="640" class="note">Con 5V no hay tensión suficiente</text>
  <text x="118" y="672" class="small">Tres caídas de LED se suman en la misma cadena.</text>

  <!-- Right breadboard: parallel -->
  <g transform="translate(674 244)">
    <rect x="0" y="0" width="390" height="330" rx="22" class="breadboard"/>
    <rect x="182" y="34" width="22" height="262" rx="10" fill="#eee9df"/>
    <line x1="28" y1="292" x2="154" y2="292" class="wire-thin red"/>
    <line x1="235" y1="292" x2="362" y2="292" class="wire-thin turq"/>
    <text x="36" y="318" class="small" fill="#e45d4f">+</text>
    <text x="344" y="318" class="small" fill="#0f9da3">-</text>

    <g opacity="0.92">
      <circle class="slot" cx="44" cy="56" r="5"/><circle class="slot" cx="74" cy="56" r="5"/><circle class="slot" cx="104" cy="56" r="5"/><circle class="slot" cx="134" cy="56" r="5"/><circle class="slot" cx="164" cy="56" r="5"/>
      <circle class="slot" cx="226" cy="56" r="5"/><circle class="slot" cx="256" cy="56" r="5"/><circle class="slot" cx="286" cy="56" r="5"/><circle class="slot" cx="316" cy="56" r="5"/><circle class="slot" cx="346" cy="56" r="5"/>
      <circle class="slot" cx="44" cy="106" r="5"/><circle class="slot" cx="74" cy="106" r="5"/><circle class="slot" cx="104" cy="106" r="5"/><circle class="slot" cx="134" cy="106" r="5"/><circle class="slot" cx="164" cy="106" r="5"/>
      <circle class="slot" cx="226" cy="106" r="5"/><circle class="slot" cx="256" cy="106" r="5"/><circle class="slot" cx="286" cy="106" r="5"/><circle class="slot" cx="316" cy="106" r="5"/><circle class="slot" cx="346" cy="106" r="5"/>
      <circle class="slot" cx="44" cy="156" r="5"/><circle class="slot" cx="74" cy="156" r="5"/><circle class="slot" cx="104" cy="156" r="5"/><circle class="slot" cx="134" cy="156" r="5"/><circle class="slot" cx="164" cy="156" r="5"/>
      <circle class="slot" cx="226" cy="156" r="5"/><circle class="slot" cx="256" cy="156" r="5"/><circle class="slot" cx="286" cy="156" r="5"/><circle class="slot" cx="316" cy="156" r="5"/><circle class="slot" cx="346" cy="156" r="5"/>
      <circle class="slot" cx="44" cy="206" r="5"/><circle class="slot" cx="74" cy="206" r="5"/><circle class="slot" cx="104" cy="206" r="5"/><circle class="slot" cx="134" cy="206" r="5"/><circle class="slot" cx="164" cy="206" r="5"/>
      <circle class="slot" cx="226" cy="206" r="5"/><circle class="slot" cx="256" cy="206" r="5"/><circle class="slot" cx="286" cy="206" r="5"/><circle class="slot" cx="316" cy="206" r="5"/><circle class="slot" cx="346" cy="206" r="5"/>
    </g>

    <!-- Parallel path -->
    <path d="M-10 82 H52" class="wire red"/>
    <rect x="52" y="63" width="78" height="38" rx="18" fill="#ddc7a0" stroke="#8b5e34" stroke-width="3"/>
    <line x1="68" y1="64" x2="68" y2="100" stroke="#8b2f23" stroke-width="5"/>
    <line x1="89" y1="64" x2="89" y2="100" stroke="#202020" stroke-width="5"/>
    <line x1="110" y1="64" x2="110" y2="100" stroke="#c2932d" stroke-width="5"/>
    <path d="M130 82 H170 V230" class="wire red"/>
    <path d="M170 98 H238" class="wire red"/>
    <path d="M170 156 H238" class="wire red"/>
    <path d="M170 214 H238" class="wire red"/>

    <path d="M314 98 H350 V248 H390" class="wire black"/>
    <path d="M314 156 H350" class="wire black"/>
    <path d="M314 214 H350" class="wire black"/>

    <g transform="translate(276 98)">
      <path d="M-22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="0" cy="-16" rx="35" ry="38" fill="#75e4e2" opacity="0.28"/>
      <path d="M-30 -16 C-30 -56 30 -56 30 -16 C30 8 12 20 0 20 C-12 20 -30 8 -30 -16Z" fill="#32d3d0" stroke="#0f9da3" stroke-width="4"/>
      <circle cx="0" cy="-18" r="13" fill="#e8fffd" opacity="0.72"/>
    </g>
    <g transform="translate(276 156)">
      <path d="M-22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="0" cy="-16" rx="35" ry="38" fill="#75e4e2" opacity="0.28"/>
      <path d="M-30 -16 C-30 -56 30 -56 30 -16 C30 8 12 20 0 20 C-12 20 -30 8 -30 -16Z" fill="#32d3d0" stroke="#0f9da3" stroke-width="4"/>
      <circle cx="0" cy="-18" r="13" fill="#e8fffd" opacity="0.72"/>
    </g>
    <g transform="translate(276 214)">
      <path d="M-22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 32 V-18" stroke="#737373" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="0" cy="-16" rx="35" ry="38" fill="#75e4e2" opacity="0.28"/>
      <path d="M-30 -16 C-30 -56 30 -56 30 -16 C30 8 12 20 0 20 C-12 20 -30 8 -30 -16Z" fill="#32d3d0" stroke="#0f9da3" stroke-width="4"/>
      <circle cx="0" cy="-18" r="13" fill="#e8fffd" opacity="0.72"/>
    </g>
    <circle class="node" cx="170" cy="82" r="8"/>
    <circle class="node" cx="170" cy="98" r="8"/>
    <circle class="node" cx="170" cy="156" r="8"/>
    <circle class="node" cx="170" cy="214" r="8"/>
    <circle class="node" cx="350" cy="98" r="8"/>
    <circle class="node" cx="350" cy="156" r="8"/>
    <circle class="node" cx="350" cy="214" r="8"/>
    <circle class="node" cx="390" cy="248" r="8"/>
  </g>

  <text x="694" y="640" class="note">Cada LED recibe 5V</text>
  <text x="694" y="672" class="small">La resistencia compartida limita la corriente total.</text>

  <!-- Cross-canvas wires from Arduino pins to both circuits -->
  <path d="M602 239 C650 192 714 186 772 326" class="wire red" opacity="0.95"/>
  <path d="M602 363 C670 430 744 474 1064 492" class="wire black" opacity="0.95"/>
  <path d="M546 239 C402 188 188 188 88 336" class="wire red" opacity="0.95"/>
  <path d="M546 363 C436 480 262 508 486 498" class="wire black" opacity="0.95"/>

  <rect x="566" y="220" width="58" height="34" rx="10" fill="#ef4444"/>
  <text x="582" y="244" class="pin-label">5V</text>
  <rect x="566" y="344" width="72" height="34" rx="10" fill="#111827"/>
  <text x="575" y="368" class="pin-label">GND</text>
</svg>
