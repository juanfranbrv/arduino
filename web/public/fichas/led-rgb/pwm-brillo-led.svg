<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PWM y brillo de un LED</title>
  <desc id="desc">Infografia educativa con tres senales PWM al 5%, 50% y 90% de tiempo en alto para explicar el brillo aparente.</desc>
  <rect width="1200" height="760" fill="#f6f3ea"/>
  <rect x="48" y="44" width="1104" height="672" rx="28" fill="#ffffff" stroke="#d7e1df" stroke-width="3"/>

  <text x="92" y="112" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#0f172a">PWM: brillo sin voltaje intermedio</text>
  <text x="92" y="158" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="600" fill="#475569">Arduino cambia muy rapido entre 0V y 5V. El ojo ve el promedio como mas o menos brillo.</text>

  <g transform="translate(92 218)">
    <rect x="0" y="0" width="1016" height="130" rx="18" fill="#ecfeff" stroke="#99f6e4" stroke-width="2"/>
    <text x="26" y="42" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#0f766e">5% encendido</text>
    <text x="26" y="82" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#334155">analogWrite bajo: LED tenue</text>
    <text x="886" y="72" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f766e">1/20</text>
    <line x1="260" y1="96" x2="808" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <line x1="260" y1="38" x2="260" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <line x1="260" y1="38" x2="288" y2="38" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
    <line x1="288" y1="38" x2="288" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <line x1="288" y1="96" x2="534" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <line x1="534" y1="96" x2="534" y2="38" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <line x1="534" y1="38" x2="562" y2="38" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
    <line x1="562" y1="38" x2="562" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <line x1="562" y1="96" x2="808" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <text x="222" y="42" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#e11d48">5V</text>
    <text x="222" y="105" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#334155">0V</text>
  </g>

  <g transform="translate(92 384)">
    <rect x="0" y="0" width="1016" height="130" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="26" y="42" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#0f172a">50% encendido</text>
    <text x="26" y="82" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#334155">mitad del tiempo a 5V</text>
    <text x="868" y="72" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">10/20</text>
    <line x1="260" y1="96" x2="808" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <path d="M260 96 V38 H397 V96 H534 V38 H671 V96 H808" fill="none" stroke="#0f172a" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="260" y1="38" x2="397" y2="38" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
    <line x1="534" y1="38" x2="671" y2="38" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
    <text x="222" y="42" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#e11d48">5V</text>
    <text x="222" y="105" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#334155">0V</text>
  </g>

  <g transform="translate(92 550)">
    <rect x="0" y="0" width="1016" height="130" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="26" y="42" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#9a3412">90% encendido</text>
    <text x="26" y="82" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#334155">analogWrite alto: LED brillante</text>
    <text x="868" y="72" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#9a3412">18/20</text>
    <line x1="260" y1="96" x2="808" y2="96" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <path d="M260 96 V38 H506 V96 H534 V38 H780 V96 H808" fill="none" stroke="#0f172a" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="260" y1="38" x2="506" y2="38" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
    <line x1="534" y1="38" x2="780" y2="38" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
    <text x="222" y="42" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#e11d48">5V</text>
    <text x="222" y="105" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#334155">0V</text>
  </g>

  <g transform="translate(844 162)">
    <rect x="0" y="0" width="264" height="36" rx="18" fill="#0f766e"/>
    <text x="132" y="25" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">~ pin PWM</text>
  </g>
  <text x="92" y="195" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#64748b">Un ciclo se repite muy rapido: Arduino alterna entre 0V y 5V.</text>
</svg>
