<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Infografía del LDR y divisor de tensión</title>
  <desc id="desc">Diagrama educativo que muestra cómo un LDR cambia su resistencia con la luz y cómo un divisor de tensión entrega una señal al pin A0.</desc>
  <rect width="1200" height="800" fill="#f7f3ec"/>
  <rect x="70" y="60" width="1060" height="680" rx="36" fill="#fffdfa" stroke="#d8d2c8" stroke-width="4"/>

  <text x="600" y="122" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#143c44">Fotocélula LDR</text>
  <text x="600" y="166" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" fill="#4b5563">la luz cambia su resistencia</text>

  <g transform="translate(116 222)">
    <rect x="0" y="0" width="300" height="190" rx="24" fill="#e8fbf8" stroke="#2fb7ad" stroke-width="4"/>
    <circle cx="92" cy="78" r="34" fill="#ffcc4d" stroke="#d89800" stroke-width="4"/>
    <g stroke="#d89800" stroke-width="5" stroke-linecap="round">
      <line x1="92" y1="22" x2="92" y2="2"/>
      <line x1="92" y1="154" x2="92" y2="132"/>
      <line x1="36" y1="78" x2="16" y2="78"/>
      <line x1="168" y1="78" x2="146" y2="78"/>
      <line x1="52" y1="38" x2="36" y2="22"/>
      <line x1="132" y1="118" x2="148" y2="134"/>
      <line x1="132" y1="38" x2="148" y2="22"/>
      <line x1="52" y1="118" x2="36" y2="134"/>
    </g>
    <text x="196" y="70" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#143c44">mucha luz</text>
    <text x="196" y="112" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#374151">menos Ω</text>
    <text x="196" y="145" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#4b5563">pasa mejor</text>
  </g>

  <g transform="translate(116 458)">
    <rect x="0" y="0" width="300" height="190" rx="24" fill="#f4f4f5" stroke="#9ca3af" stroke-width="4"/>
    <circle cx="92" cy="78" r="34" fill="#cbd5e1" stroke="#64748b" stroke-width="4"/>
    <path d="M42 120 C76 98 112 98 146 120" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
    <text x="196" y="70" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#143c44">poca luz</text>
    <text x="196" y="112" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#374151">más Ω</text>
    <text x="196" y="145" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#4b5563">se opone más</text>
  </g>

  <g transform="translate(520 220)">
    <rect x="0" y="0" width="520" height="430" rx="26" fill="#ffffff" stroke="#d8d2c8" stroke-width="4"/>
    <text x="260" y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#143c44">Divisor de tensión</text>

    <rect x="52" y="94" width="90" height="52" rx="14" fill="#ef4444"/>
    <text x="97" y="129" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="white">5V</text>

    <rect x="52" y="330" width="90" height="52" rx="14" fill="#1f2937"/>
    <text x="97" y="365" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="white">GND</text>

    <g stroke="#374151" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="142" y1="120" x2="238" y2="120"/>
      <polyline points="238,120 252,94 276,146 300,94 324,146 348,94 372,146 386,120"/>
      <line x1="386" y1="120" x2="428" y2="120"/>
      <line x1="428" y1="120" x2="428" y2="226"/>
      <line x1="428" y1="226" x2="428" y2="330"/>
      <line x1="142" y1="356" x2="238" y2="356"/>
      <polyline points="238,356 252,330 276,382 300,330 324,382 348,330 372,382 386,356"/>
      <line x1="386" y1="356" x2="428" y2="356"/>
    </g>

    <circle cx="428" cy="226" r="13" fill="#2fb7ad"/>
    <line x1="428" y1="226" x2="314" y2="226" stroke="#2fb7ad" stroke-width="8" stroke-linecap="round"/>
    <rect x="212" y="194" width="102" height="64" rx="14" fill="#2fb7ad"/>
    <text x="263" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="white">A0</text>

    <text x="313" y="84" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#143c44">LDR</text>
    <text x="312" y="414" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#143c44">10kΩ</text>
    <text x="352" y="204" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#0f766e">voltaje variable</text>
    <text x="352" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#374151">0 a 1023</text>
  </g>
</svg>
